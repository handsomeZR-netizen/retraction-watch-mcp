name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:

jobs:
  test:
    name: Node 20 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build core and ingest
        run: npm run build

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Pack dry run (core)
        run: npm pack --dry-run -w @rw/core
